# Kubernetes Secret that holds database credentials and JWT signing keys.
# Values are supplied at install time via --set flags — never commit real values.
#
# Example:
#   helm install dam ./app/helm/dam -f values-dev.yaml \
#     --set secrets.databaseUrl="postgresql://damadmin:<pass>@<rds-endpoint>:5432/dam" \
#     --set secrets.jwtSecret="$(openssl rand -hex 32)" \
#     --set secrets.jwtRefreshSecret="$(openssl rand -hex 32)"
apiVersion: v1
kind: Secret
metadata:
  name: dam-secrets
  namespace: {{ include "dam.namespace" . }}
  labels:
    {{- include "dam.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  JWT_REFRESH_SECRET: {{ .Values.secrets.jwtRefreshSecret | quote }}
