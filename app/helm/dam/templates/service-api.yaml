apiVersion: v1
kind: Service
metadata:
  name: dam-api
  namespace: {{ include "dam.namespace" . }}
  labels:
    {{- include "dam.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app: dam-api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
