apiVersion: v1
kind: ServiceAccount
metadata:
  name: dam-api
  namespace: {{ include "dam.namespace" . }}
  labels:
    {{- include "dam.labels" . | nindent 4 }}
  annotations:
    # IRSA — allows this pod to call AWS APIs using the IAM role.
    # Set to the value of: terraform output dam_api_irsa_role_arn
    eks.amazonaws.com/role-arn: {{ .Values.api.irsaRoleArn | quote }}
