apiVersion: apps/v1
kind: Deployment
metadata:
  name: dam-api
  namespace: {{ include "dam.namespace" . }}
  labels:
    {{- include "dam.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: dam-api
  template:
    metadata:
      labels:
        app: dam-api
        {{- include "dam.labels" . | nindent 8 }}
    spec:
      serviceAccountName: dam-api
      containers:
        - name: dam-api
          image: {{ include "dam.image" (dict "root" . "name" "dam/api") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          # Credentials from the Kubernetes Secret
          envFrom:
            - secretRef:
                name: dam-secrets
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: AWS_REGION
              value: {{ .Values.global.region | quote }}
            - name: S3_BUCKET
              value: {{ .Values.api.s3Bucket | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
