apiVersion: v1
kind: Service
metadata:
  name: dam-web
  namespace: {{ include "dam.namespace" . }}
  labels:
    {{- include "dam.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app: dam-web
  ports:
    - name: http
      port: 80
      targetPort: 80
