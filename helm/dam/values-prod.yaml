# Production environment overrides.
# Usage: helm upgrade dam ./helm/dam -f app/helm/dam/values-prod.yaml --reuse-values

global:
  namespace: dam-prod

api:
  replicas: 2
  s3Bucket: "dam-assets-395675597879-prod"
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

web:
  replicas: 3

transformWorker:
  replicas: 2
  pollIntervalMs: "5000"

exportWorker:
  replicas: 2
  pollIntervalMs: "5000"

image:
  pullPolicy: IfNotPresent
