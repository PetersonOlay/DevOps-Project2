apiVersion: apps/v1
kind: Deployment
metadata:
  name: dam-web
  namespace: {{ .Values.global.namespace }}
  labels:
    app: dam-web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app: dam-web
  template:
    metadata:
      labels:
        app: dam-web
    spec:
      containers:
        - name: dam-web
          image: "{{ .Values.image.registry }}/dam/web:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: {{ .Values.web.resources.requests.cpu }}
              memory: {{ .Values.web.resources.requests.memory }}
            limits:
              cpu: {{ .Values.web.resources.limits.cpu }}
              memory: {{ .Values.web.resources.limits.memory }}
