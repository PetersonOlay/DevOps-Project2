apiVersion: apps/v1
kind: Deployment
metadata:
  name: dam-api
  namespace: {{ .Values.global.namespace }}
  labels:
    app: dam-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: dam-api
  template:
    metadata:
      labels:
        app: dam-api
    spec:
      serviceAccountName: dam-api
      containers:
        - name: dam-api
          image: "{{ .Values.image.registry }}/dam/api:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: dam-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: AWS_REGION
              value: {{ .Values.global.region }}
            - name: S3_BUCKET
              value: {{ .Values.api.s3Bucket }}
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: {{ .Values.api.resources.requests.cpu }}
              memory: {{ .Values.api.resources.requests.memory }}
            limits:
              cpu: {{ .Values.api.resources.limits.cpu }}
              memory: {{ .Values.api.resources.limits.memory }}
