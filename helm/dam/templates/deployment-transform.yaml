apiVersion: apps/v1
kind: Deployment
metadata:
  name: dam-transform-worker
  namespace: {{ .Values.global.namespace }}
  labels:
    app: dam-transform-worker
spec:
  replicas: {{ .Values.transformWorker.replicas }}
  selector:
    matchLabels:
      app: dam-transform-worker
  template:
    metadata:
      labels:
        app: dam-transform-worker
    spec:
      serviceAccountName: dam-transform-worker
      containers:
        - name: dam-transform-worker
          image: "{{ .Values.image.registry }}/dam/transform-worker:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: dam-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: AWS_REGION
              value: {{ .Values.global.region }}
            - name: S3_BUCKET
              value: {{ .Values.api.s3Bucket }}
            - name: POLL_INTERVAL_MS
              value: {{ .Values.transformWorker.pollIntervalMs | quote }}
          resources:
            requests:
              cpu: {{ .Values.transformWorker.resources.requests.cpu }}
              memory: {{ .Values.transformWorker.resources.requests.memory }}
            limits:
              cpu: {{ .Values.transformWorker.resources.limits.cpu }}
              memory: {{ .Values.transformWorker.resources.limits.memory }}
