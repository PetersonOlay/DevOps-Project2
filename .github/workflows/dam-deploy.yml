name: DAM Platform — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "helm/**"
      - ".github/workflows/dam-deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options: [dev, stg, prod]

env:
  AWS_REGION: us-east-1
  ECR_PREFIX: ${{ vars.ECR_PREFIX }}
  # Push to main always targets dev.
  # workflow_dispatch lets you promote to stg or prod manually.
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  prepare:
    name: Compute image tag
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Set image tag with timestamp
        id: tag
        run: echo "image_tag=sha-${{ github.sha }}-$(date -u +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

  build-and-push:
    name: Build & push images to ECR
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        service:
          - name: api
            context: app/api
            image: dam/api
          - name: web
            context: app/web
            image: dam/web
          - name: transform-worker
            context: app/transform-worker
            image: dam/transform-worker
          - name: export-worker
            context: app/export-worker
            image: dam/export-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2.0.1

      - name: Build and push ${{ matrix.service.name }}
        run: |
          IMAGE="${{ env.ECR_PREFIX }}/${{ matrix.service.image }}"
          SHA="${{ github.sha }}"
          TAG="${{ needs.prepare.outputs.image_tag }}"

          docker build \
            --cache-from "$IMAGE:latest" \
            -t "$IMAGE:$TAG" \
            -t "$IMAGE:sha-$SHA" \
            -t "$IMAGE:latest" \
            "${{ matrix.service.context }}"

          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:sha-$SHA"
          docker push "$IMAGE:latest"

  deploy:
    name: Deploy to EKS (${{ github.event.inputs.environment || 'dev' }})
    needs: [prepare, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name eks-${{ env.ENVIRONMENT }}-cluster

      - name: Prepare namespace for Helm
        run: |
          NAMESPACE="dam-${{ env.ENVIRONMENT }}"
          kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace "${NAMESPACE}" \
            app.kubernetes.io/managed-by=Helm --overwrite
          kubectl annotate namespace "${NAMESPACE}" \
            meta.helm.sh/release-name=dam \
            meta.helm.sh/release-namespace="${NAMESPACE}" --overwrite

      - name: Deploy Helm chart
        run: |
          NAMESPACE="dam-${{ env.ENVIRONMENT }}"
          ENV="${{ env.ENVIRONMENT }}"

          API_ROLE_ARN=$(aws iam get-role \
            --role-name "dam-api-irsa-${ENV}" \
            --query 'Role.Arn' --output text)
          WORKER_ROLE_ARN=$(aws iam get-role \
            --role-name "dam-worker-irsa-${ENV}" \
            --query 'Role.Arn' --output text)

          helm upgrade --install dam ./helm/dam \
            -f ./helm/dam/values-${ENV}.yaml \
            --namespace "${NAMESPACE}" \
            --create-namespace \
            --set api.irsaRoleArn="${API_ROLE_ARN}" \
            --set transformWorker.irsaRoleArn="${WORKER_ROLE_ARN}" \
            --set exportWorker.irsaRoleArn="${WORKER_ROLE_ARN}" \
            --set image.tag="${{ needs.prepare.outputs.image_tag }}"

      - name: Create application secrets
        run: |
          NAMESPACE="dam-${{ env.ENVIRONMENT }}"
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "dam-${{ env.ENVIRONMENT }}-app" \
            --region ${{ env.AWS_REGION }} \
            --query SecretString --output text)
          DB_HOST=$(echo "$SECRET" | jq -r '.db_host')
          DB_USERNAME=$(echo "$SECRET" | jq -r '.db_username')
          DB_PASSWORD=$(echo "$SECRET" | jq -r '.db_password')
          JWT_SECRET=$(echo "$SECRET" | jq -r '.jwt_secret')
          JWT_REFRESH_SECRET=$(echo "$SECRET" | jq -r '.jwt_refresh_secret')
          DB_URL="postgresql://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}:5432/dam"
          kubectl create secret generic dam-secrets \
            --namespace="${NAMESPACE}" \
            --from-literal=DATABASE_URL="${DB_URL}" \
            --from-literal=JWT_SECRET="${JWT_SECRET}" \
            --from-literal=JWT_REFRESH_SECRET="${JWT_REFRESH_SECRET}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Wait for rollouts
        run: |
          NAMESPACE="dam-${{ env.ENVIRONMENT }}"
          for svc in api web transform-worker export-worker; do
            kubectl rollout status deployment/dam-${svc} \
              -n "${NAMESPACE}" \
              --timeout=300s
          done

      - name: Verify health
        run: |
          NAMESPACE="dam-${{ env.ENVIRONMENT }}"
          kubectl get pods -n "${NAMESPACE}"
          kubectl get ingress -n "${NAMESPACE}"
