name: DAM Platform — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "helm/**"
      - ".github/workflows/dam-deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options: [dev, stg, prod]

env:
  AWS_REGION: us-east-1
  ECR_PREFIX: ${{ vars.ECR_PREFIX }}
  # Push to main always targets dev.
  # workflow_dispatch lets you promote to stg or prod manually.
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  build-and-push:
    name: Build & push images to ECR
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        service:
          - name: api
            context: app/api
            image: dam/api
          - name: web
            context: app/web
            image: dam/web
          - name: transform-worker
            context: app/transform-worker
            image: dam/transform-worker
          - name: export-worker
            context: app/export-worker
            image: dam/export-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2.0.1

      - name: Build and push ${{ matrix.service.name }}
        run: |
          IMAGE="${{ env.ECR_PREFIX }}/${{ matrix.service.image }}"
          SHA="${{ github.sha }}"

          docker build \
            --cache-from "$IMAGE:latest" \
            -t "$IMAGE:sha-$SHA" \
            -t "$IMAGE:latest" \
            "${{ matrix.service.context }}"

          docker push "$IMAGE:sha-$SHA"
          docker push "$IMAGE:latest"

  deploy:
    name: Deploy to EKS (${{ github.event.inputs.environment || 'dev' }})
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name eks-${{ env.ENVIRONMENT }}-cluster

      - name: Prepare namespace for Helm
        run: |
          NAMESPACE="dam-${{ env.ENVIRONMENT }}"
          kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace "${NAMESPACE}" \
            app.kubernetes.io/managed-by=Helm --overwrite
          kubectl annotate namespace "${NAMESPACE}" \
            meta.helm.sh/release-name=dam \
            meta.helm.sh/release-namespace="${NAMESPACE}" --overwrite

      - name: Create application secrets
        run: |
          NAMESPACE="dam-${{ env.ENVIRONMENT }}"
          DB_URL="postgresql://postgres:${{ secrets.DB_PASSWORD }}@${{ secrets.DB_HOST }}:5432/dam"
          kubectl create secret generic dam-secrets \
            --namespace="${NAMESPACE}" \
            --from-literal=DATABASE_URL="${DB_URL}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Helm chart
        run: |
          NAMESPACE="dam-${{ env.ENVIRONMENT }}"
          helm upgrade --install dam ./helm/dam \
            -f ./helm/dam/values-${{ env.ENVIRONMENT }}.yaml \
            --namespace "${NAMESPACE}" \
            --create-namespace

      - name: Update image tags in deployments
        run: |
          SHA="${{ github.sha }}"
          NAMESPACE="dam-${{ env.ENVIRONMENT }}"
          for svc in api web transform-worker export-worker; do
            IMAGE="${{ env.ECR_PREFIX }}/dam/${svc}:sha-${SHA}"
            kubectl set image deployment/dam-${svc} dam-${svc}="${IMAGE}" \
              -n "${NAMESPACE}" || true
          done

      - name: Wait for rollouts
        run: |
          NAMESPACE="dam-${{ env.ENVIRONMENT }}"
          for svc in api web transform-worker export-worker; do
            kubectl rollout status deployment/dam-${svc} \
              -n "${NAMESPACE}" \
              --timeout=300s
          done

      - name: Verify health
        run: |
          NAMESPACE="dam-${{ env.ENVIRONMENT }}"
          kubectl get pods -n "${NAMESPACE}"
          kubectl get ingress -n "${NAMESPACE}"
